<div class="d-flex justify-content-center align-items-center con">
    <div class="col-12 col-sm-7 col-lg-6">
        <div class="card box">

            <h5 class="ps-3 pt-3 mb-0">Account Information</h5>

            <div class="card-body">
              <table class="table table-bordered" *ngIf="userdetails()">
                <tbody>
                  <tr>
                    <th><i class="bi bi-person me-2"></i>Name</th>
                    <td>{{userdetails().userName}}</td>
                  </tr>
                  <tr>
                    <th><i class="bi bi-envelope me-2"></i>Email</th>
                    <td>{{userdetails().emailAddress}}</td>
                  </tr>
                  <tr>
                    <th><i class="bi bi-telephone me-2"></i>Mobile</th>
                    <td>{{userdetails().mobileNumber}}</td>
                  </tr>
                </tbody>
              </table>
            </div>
        </div>
    </div>
</div>

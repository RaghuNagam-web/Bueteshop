<div class="container con d-flex align-items-center justify-content-center">
  <form class="form-container" [formGroup]="reviewform" (ngSubmit)="submit()">
    <h4 class="text-center">Submit Review & Rating</h4>
    <div *ngIf="addreview()">
      <p class="text-center">CouponName : {{addreview().couponName}}</p>
    </div>
    <div class="mt-3 mb-3">
      <input type="number" placeholder="Rating (1to5)"  class="form-control py-2" formControlName="rating">
    </div>
    <div class="mb-3">
      <textarea placeholder="write your remarks" class="form-control py-2" formControlName="review"></textarea>
    </div>
    <button type="submit" class="btn custom-btn d-block mx-auto">Submit</button>

    <table class="table table-bordered mt-3 ">
      <thead>
        <tr class="text-center c">
          <th >Coupon Name</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let d of deals()">
          <td class="middle">{{d.couponName}}</td>
          <td>
            <button type="button" class="btn  fw-medium border-0" style="color:#004267" (click)="addReview(d)">Add Review</button>   <!--(click)="addReview(d.couponId,d.merchantId)"-->
          </td>
        </tr>
      </tbody>
    </table>
  </form>

</div>

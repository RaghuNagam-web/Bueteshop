<div class="container-fluid cf pb-2 pb-lg-4 pt-4 pt-lg-5">
  <div class="container p-0"> <!--style="max-width:62% ;width: 100%;"-->
    <h4>TODAY'S TOP COUPONS & OFFERS</h4>
     <div class="row mt-3 mt-lg-4 mt-xl-5">
          <div class="col-9">
            <div *ngIf="loadingright()">
              <div class="spinner-border" style="color:#004267;" role="status"></div>
                <!-- <p class="text-muted mt-2">Loading Rightbanner...</p> -->
            </div>

              <a [href]="rightmerchanturl()" target="_blank"><img [src]="rightimage()" class="w-100"></a>

          </div>
          <div class="col-3 ps-0 ps-lg-1">
            <div *ngIf="loadingleft()" >
              <div class="spinner-border" style="color:#004267"></div>
              <!-- <p class="text-muted mt-2">Loading Leftbanner...</p> -->
            </div>

              <a [href]="leftmerchanturl()" target="_blank"><img  [src]="leftimage()" class="w-100 "></a>

          </div>
      </div>
  </div>
</div>

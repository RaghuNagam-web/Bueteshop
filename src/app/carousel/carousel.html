<div class="text-center mt-5 mb-5 alert alert-success pa-2 w-50 mx-auto" *ngIf="isLoading()">
    Loading banners...
</div>

<div class="container-fluid p-0">
  <div class="container container1 p-0">
    <div *ngIf="!isLoading() && images().length > 0"
         id="carousel"
         class="carousel slide position-relative"
         data-bs-ride="carousel"
         data-bs-interval="3000">

      <img src="./flower.png" alt="flower" class="d-block img-fluid flower">

      <div class="carousel-inner">
        @for (item of images(); track $index) {
        <div class="carousel-item" [class.active]="$index === 0">
          <a [href]="item.url" target="_blank">
            <img [src]="item.src" class="d-block w-100">
          </a>
        </div>
        }
      </div>

      <button class="carousel-control-prev" type="button" data-bs-target="#carousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>

    </div>
  </div>
</div>
